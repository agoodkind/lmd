name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The caller job id is the middle segment of every reusable-workflow status
  # check name (`CI / swift / build`).
  swift:
    uses: agoodkind/swift-makefile/.github/workflows/_ci.yml@main
    with:
      runner: macos-26
      brew-packages: ccache
      setup-target: preflight
      make-args: "CONFIG=Release SWIFT_MK_SWIFTPM_COMPILE_CACHE=auto SWIFT_MK_SWIFTPM_CACHE_DIAGNOSTICS=1"
      # build signs the CLI binaries + MLX bundle via SWIFT_MK_SIGN_* (Makefile).
      import-signing-cert: true
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
      extra-cache-paths: |
        .build
        Tuist/.build
        Derived
        Products/Build
        ~/Library/Caches/org.swift.swiftpm
        ~/Library/Caches/ccache
    secrets: inherit

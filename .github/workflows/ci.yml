name: CI

# Run on push to main and every PR. `concurrency` cancels stale runs
# on the same branch so a push-heavy PR stops racing with itself.
on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (macOS)
    runs-on: macos-26
    timeout-minutes: 30
    env:
      # Keep SwiftPM quiet and deterministic.
      SWIFTPM_ENABLE_COMMAND_PLUGINS: "false"
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Cache SwiftPM build + deps
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build (release)
        run: swift build -c release

      - name: Unit + snapshot + integration tests
        run: swift test

      - name: Log audit
        run: make log-audit

      # `make smoke` is a developer convenience that spawns lmd-serve
      # outside launchd and pokes its HTTP endpoints. It is intentionally
      # not run in CI: the broker is a LaunchAgent in production and the
      # XPC listener is guarded against non-launchd contexts, so a CI
      # smoke without launchd registration is low-signal.

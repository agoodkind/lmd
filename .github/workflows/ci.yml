name: CI

# Run on push to main and every PR. `concurrency` cancels stale runs
# on the same branch so a push-heavy PR stops racing with itself.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    env:
      # Keep SwiftPM quiet and deterministic.
      SWIFTPM_ENABLE_COMMAND_PLUGINS: "false"
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Cache SwiftPM build + deps
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build (release)
        run: swift build -c release

      - name: Unit + snapshot + integration tests
        run: swift test

      - name: Log audit
        run: make log-audit

      # smoke-lmd-serve.sh spawns lmd-serve and hits a few endpoints.
      # Runs on top of the release build above.
      - name: lmd-serve smoke
        run: make smoke

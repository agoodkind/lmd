name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: agoodkind/swift-makefile/.github/workflows/_ci.yml@main
    with:
      runner: macos-26
      brew-packages: ccache
      setup-target: preflight
      targets: '["build","test"]'
      make-args: "CONFIG=Release"
      extra-cache-paths: |
        .build
        Tuist/.build
        Derived
        Products/Build
        ~/Library/Caches/org.swift.swiftpm
        ~/Library/Caches/ccache
    secrets: inherit

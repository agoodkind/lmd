name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# The caller must grant every permission the called workflow's jobs request.
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    uses: agoodkind/swift-makefile/.github/workflows/_release.yml@main
    with:
      runner: macos-26
      brew-packages: ccache
      make-args: "SWIFT_MK_BUILD_CACHE=ccache"
      # lmd ships bare CLI binaries: lmd-dev notarizes its own zip inside the
      # build hook (a zip of bare binaries cannot be stapled), so the shared
      # notarize step is disabled; the pattern still drives attestation.
      notarize: false
      notarize-pattern: "*.zip"
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
    secrets: inherit

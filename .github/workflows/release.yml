name: Release

# Every push to main auto-tags and releases a signed + notarized bundle
# of the five lmd CLIs. Modeled on agoodkind/go-makefile's release flow,
# adapted for a SwiftPM project without goreleaser.
#
# Secrets required (set via `gh secret set`):
#   APPLE_DEVELOPER_ID_P12_BASE64     single-identity Developer ID .p12
#   APPLE_DEVELOPER_ID_P12_PASSWORD   import password for that .p12
#   APPLE_CODE_SIGN_IDENTITY          SHA1 of the identity to use
#   APPLE_TEAM_ID                     10-char team id
#   APPLE_API_KEY_P8_BASE64           notarytool API key (.p8)
#   APPLE_API_KEY_ID                  10-char key id
#   APPLE_API_ISSUER_ID               issuer UUID

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: sign + notarize + release
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: swift Tools/lmd-dev.swift toolchain

      - name: Cache SwiftPM build + deps
        uses: actions/cache@v5
        with:
          path: |
            Tuist/.build
            Derived
            Products/Build
            ~/Library/Caches/org.swift.swiftpm
          key: tuist-${{ runner.os }}-${{ hashFiles('Tuist/Package.resolved') }}
          restore-keys: |
            tuist-${{ runner.os }}-

      - name: Build (release)
        run: swift Tools/lmd-dev.swift build Release

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: swift Tools/lmd-dev.swift ci-import-cert

      - name: Codesign binaries
        env:
          APPLE_CODE_SIGN_IDENTITY: ${{ secrets.APPLE_CODE_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: swift Tools/lmd-dev.swift ci-sign

      - name: Notarize
        id: notarize
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: swift Tools/lmd-dev.swift ci-notarize

      - name: Compute release tag
        id: tag
        run: swift Tools/lmd-dev.swift release-tag

      - name: Push tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: swift Tools/lmd-dev.swift push-tag

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          ARTIFACT: ${{ steps.notarize.outputs.artifact }}
        run: swift Tools/lmd-dev.swift github-release

      - name: Clean up temp keychain
        if: always()
        run: swift Tools/lmd-dev.swift cleanup-keychain

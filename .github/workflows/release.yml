name: Release

# Every push to main auto-tags and releases a signed + notarized bundle
# of the five lmd CLIs. Modeled on agoodkind/go-makefile's release flow,
# adapted for a SwiftPM project without goreleaser.
#
# Secrets required (set via `gh secret set`):
#   APPLE_DEVELOPER_ID_P12_BASE64     single-identity Developer ID .p12
#   APPLE_DEVELOPER_ID_P12_PASSWORD   import password for that .p12
#   APPLE_CODE_SIGN_IDENTITY          SHA1 of the identity to use
#   APPLE_TEAM_ID                     10-char team id
#   APPLE_API_KEY_P8_BASE64           notarytool API key (.p8)
#   APPLE_API_KEY_ID                  10-char key id
#   APPLE_API_ISSUER_ID               issuer UUID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: sign + notarize + release
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Cache SwiftPM build + deps
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build (release)
        run: swift build -c release

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: ./scripts/ci-import-cert.sh

      - name: Codesign binaries
        env:
          APPLE_CODE_SIGN_IDENTITY: ${{ secrets.APPLE_CODE_SIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/ci-sign.sh

      - name: Notarize
        id: notarize
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./scripts/ci-notarize.sh

      - name: Compute release tag
        id: tag
        run: |
          TS=$(date -u +%Y%m%d%H%M)
          HEX=$(printf '%x' "$GITHUB_RUN_NUMBER")
          SHA=$(git rev-parse --short HEAD)
          TAG="${TS}-${HEX}-${SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Push tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          ARTIFACT: ${{ steps.notarize.outputs.artifact }}
        run: |
          gh release create "$TAG" "$ARTIFACT" \
            --title "$TAG" \
            --notes "Signed + notarized build from $GITHUB_SHA. Bare CLI binaries cannot be stapled; first-launch Gatekeeper checks hit the network."

      - name: Clean up temp keychain
        if: always()
        run: |
          if [[ -n "${CI_KEYCHAIN_PATH:-}" && -f "$CI_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$CI_KEYCHAIN_PATH" || true
          fi
